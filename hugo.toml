baseURL = 'https://blog.tappat.top/'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh'
title = 'TappaT的博客'
theme = 'mini'
hasCJKLanguage = true
pagination.pagerSize = 3

[permalinks]
  posts = "/posts/:title/"

# 分类配置
[taxonomies]
  category = "categories"
  tag = "tags"

# Markdown配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    guessSyntax = true
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

# 站点参数
[params]
  author = "tappat"
  bio = "NEW LUDEN"
  description = "TappaT 的个人博客，记录技术学习与项目实践"
  enableRSS = true
  enableComments = false
  enableGoogleAnalytics = false
  showToc = true
  showPowerBy = true
  hiddenPostSummaryInHomePage = false
  math = false
  copyright = "© Copyright 2026 ❤ tappat"

  [params.social]
    github = "https://github.com/tappat225"

  # 额外导航链接
  # links:
  #   - name: 作品集
  #     path: /portfolio
